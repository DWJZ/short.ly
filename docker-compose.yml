services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shortly}
      POSTGRES_USER: ${POSTGRES_USER:-shortly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortly}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - .env
    environment:
      HTTP_ADDR: 0.0.0.0:${BACKEND_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-shortly}:${POSTGRES_PASSWORD:-shortly}@postgres:5432/${POSTGRES_DB:-shortly}?sslmode=disable
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
